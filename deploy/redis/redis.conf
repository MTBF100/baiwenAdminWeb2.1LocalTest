# 绑定地址（仅允许本机和 Docker 网络访问）
bind 0.0.0.0

# 端口
port 6379

# 密码保护（生产环境务必设置）
# requirepass YourRedisPassword

# 最大内存限制（2GB 服务器建议 256MB）
maxmemory 256mb

# 内存淘汰策略（优先淘汰最近最少使用的 key）
maxmemory-policy allkeys-lru

# 持久化 - RDB 快照
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 持久化 - AOF 日志
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 日志级别
loglevel notice

# 连接配置
timeout 300
tcp-keepalive 60
maxclients 100

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
